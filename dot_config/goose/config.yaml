OLLAMA_HOST: http://192.168.86.100:7869
GOOSE_PROVIDER: ollama
GOOSE_MODEL: qwen3-coder:30b
GOOSE_TELEMETRY_ENABLED: false
extensions:
  apps:
    enabled: true
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  extensionmanager:
    enabled: true
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  todo:
    enabled: true
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  tom:
    enabled: true
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  summon:
    enabled: true
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  chatrecall:
    enabled: false
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  developer:
    enabled: true
    type: platform
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    bundled: true
    available_tools: []
  code_execution:
    enabled: true
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  computercontroller:
    enabled: true
    type: builtin
    name: computercontroller
    description: controls for webscraping, file caching, and automations
    display_name: Computer Controller
    timeout: 300
    bundled: true
    available_tools: []
  analyze:
    enabled: true
    type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
  summarize:
    enabled: false
    type: platform
    name: summarize
    description: Load files/directories and get an LLM summary in a single call
    display_name: Summarize
    bundled: true
    available_tools: []
  goosedocs:
    enabled: true
    type: stdio
    name: goose Docs
    description: GitMCP for goose documentation
    cmd: npx
    args:
    - mcp-remote
    - https://block.gitmcp.io/goose/
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  gitmcp:
    enabled: true
    type: stdio
    name: Git MCP
    description: Git MCP server for up-to-date docs and project insights
    cmd: npx
    args:
    - -y
    - mcp-remote
    - https://gitmcp.io/docs
    envs: {}
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
slash_commands:
- command: implement-plan
  recipe_path: "./recipes/rpi-implement.yaml"
- command: iterate-plan
  recipe_path: "./recipes/rpi-iterate.yaml"
- command: create-plan
  recipe_path: "./recipes/rpi-plan.yaml"
- command: research-codebase
  recipe_path: "./recipes/rpi-research.yaml"
